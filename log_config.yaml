version: 1
disable_existing_loggers: False

formatters:
  default:
    format: "%(asctime)s %(levelname)s: %(message)s"

handlers:
  file:
    class: logging.handlers.TimedRotatingFileHandler
    formatter: default
    filename: logs/landsealot_form.log
    when:  midnight
    interval: 1
    backupCount: 30
    encoding: utf-8

loggers:
    landsealot_form:
      level: DEBUG
      handlers: [file]
      propagate: no

root:
  level: WARNING
  handlers: [file]
